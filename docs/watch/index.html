<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Havvn — Watch</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 295.8'%3E%3Cpath fill='%23161311' d='M6.2 6.3L217 147.9L223.9 161.8L256 127.7L288.1 161.8L295 147.9L505.8 6.3L366.7 222.8L369.2 232.2L330.5 289.6L256 204.6L181.5 289.6L142.8 232.2L145.3 222.8Z'/%3E%3Cpath fill='%23e25117' d='M478.1 34.8L358.2 221.2L360.4 230.9L329.7 276.6L256 192.5L182.3 276.6L151.6 230.9L154.1 221.8L153.8 221.2L33.9 34.8L211 153.4L221.7 175.9L256 139.3L290.3 175.9L301 153.4Z'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- Non-blocking web fonts — playback never waits on the font host. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'" />
<style>
  /* Havvn "Blaze" — W-wings era chrome around a bare player (mirrors docs/index.html). */
  :root {
    --ink: #0d0c0a; --line: rgba(242,230,220,0.10);
    --text: #f2efe9; --muted: #8d867b;
    --blaze: #e25117; --blaze-hot: #ff6a2a;
    --olive: #adb87c; --danger: #e2664a;
    --display: 'Chakra Petch', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #000; color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .wrap { height: 100%; display: flex; flex-direction: column; }
  .top { display: flex; align-items: center; gap: 11px; padding: 11px 16px; background: var(--ink);
    border-bottom: 1px solid var(--line); position: relative; }
  .top::after { content: ""; position: absolute; left: 0; right: 62%; bottom: -1px; height: 2px;
    background: linear-gradient(90deg, var(--blaze), transparent); pointer-events: none; }
  .top .mk { display: block; flex: none; width: 30px; height: auto; }
  .top h1 { display: flex; align-items: center; gap: 8px; font-size: 12.5px; margin: 0; font-weight: 600; flex: 1;
    font-family: var(--display); letter-spacing: .07em; text-transform: uppercase; line-height: 1; }
  .top h1 .wmh { height: 11px; width: auto; display: block; }
  .top h1 .hsep { font-family: var(--mono); color: var(--blaze-hot); font-weight: 400; }
  .status { display: flex; align-items: center; gap: 9px; font-size: 11px; color: var(--muted);
    font-family: var(--mono); letter-spacing: .05em; text-transform: uppercase; }
  .dot { width: 8px; height: 8px; background: var(--muted); transform: rotate(45deg); }
  .dot.live { background: var(--olive); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(173,184,124,.5)} 70%{box-shadow:0 0 0 7px rgba(173,184,124,0)} 100%{box-shadow:0 0 0 0 rgba(173,184,124,0)} }
  video { flex: 1; width: 100%; height: 100%; background: #000; outline: none; }
  .msg { padding: 14px 16px; font-size: 11.5px; line-height: 1.6; color: var(--muted);
    background: var(--ink); border-top: 1px solid var(--line); font-family: var(--mono); }
  .msg:empty { display: none; }
  .msg.err { color: var(--danger); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <svg class="mk" viewBox="0 0 512 295.8" aria-hidden="true">
      <path fill="#161311" d="M6.2 6.3L217 147.9L223.9 161.8L256 127.7L288.1 161.8L295 147.9L505.8 6.3L366.7 222.8L369.2 232.2L330.5 289.6L256 204.6L181.5 289.6L142.8 232.2L145.3 222.8Z"/><path fill="#e25117" d="M478.1 34.8L358.2 221.2L360.4 230.9L329.7 276.6L256 192.5L182.3 276.6L151.6 230.9L154.1 221.8L153.8 221.2L33.9 34.8L211 153.4L221.7 175.9L256 139.3L290.3 175.9L301 153.4Z"/>
    </svg>
    <h1><svg class="wmh" viewBox="0 0 440 100" role="img" aria-label="Havvn"><path fill="#f2efe9" d="M11.5 18.0L40.0 0.0L26.0 100.0L0.0 100.0ZM60.0 0.0L86.0 0.0L74.5 82.0L46.0 100.0ZM28.7 38.0L60.7 38.0L57.5 61.0L25.5 61.0ZM138.0 0.0L133.8 30.0L111.0 100.0L85.0 100.0ZM138.0 0.0L163.0 100.0L137.0 100.0L133.8 30.0ZM110.3 62.0L148.3 62.0L145.2 84.0L107.2 84.0ZM364.0 0.0L390.0 0.0L376.0 100.0L350.0 100.0ZM411.5 18.0L440.0 0.0L426.0 100.0L400.0 100.0ZM364.0 0.0L390.0 0.0L426.0 100.0L400.0 100.0Z"/><path fill="#e25117" d="M190.0 0.0L218.0 0.0L218.9 72.0L215.0 100.0ZM268.0 0.0L240.0 0.0L218.9 72.0L215.0 100.0ZM273.0 0.0L301.0 0.0L301.9 72.0L298.0 100.0ZM351.0 0.0L323.0 0.0L301.9 72.0L298.0 100.0Z"/></svg><span class="hsep">//</span> Watch</h1>
    <div class="status"><span class="dot" id="dot"></span><span id="st">Connecting…</span></div>
  </div>
  <video id="v" controls autoplay playsinline></video>
  <div class="msg" id="m">The sender must keep Havvn open and the stream running.</div>
</div>

<script type="module">
  const $ = (id) => document.getElementById(id);
  const v = $('v');
  function setStatus(t, live) { $('st').textContent = t; $('dot').className = 'dot' + (live ? ' live' : ''); }
  function note(t, err) { $('m').textContent = t || ''; $('m').className = 'msg' + (err ? ' err' : ''); }
  function fail(t) { setStatus('Error', false); note(t, true); }

  const TRACKERS = [
    'wss://tracker.openwebtorrent.com',
    'wss://tracker.webtorrent.dev',
    'wss://tracker.files.fm:7073/announce'
  ];
  const STUN = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:global.stun.twilio.com:3478' }
  ];
  // No bundled TURN — openrelay is defunct (kept in sync with ice-servers.ts).
  const TURN = [];

  // Parse the session id (and optional "|nt" = no TURN) from the URL hash.
  let raw = '';
  try { raw = decodeURIComponent(location.hash.replace(/^#/, '')); } catch (e) {}
  let noTurn = false;
  const bar = raw.indexOf('|nt');
  if (bar !== -1) { noTurn = true; raw = raw.slice(0, bar); }
  if (!/^[a-f0-9]{32}$/.test(raw)) { fail('Invalid or missing watch link.'); throw new Error('bad link'); }
  const iceServers = noTurn ? STUN : STUN.concat(TURN);

  const hex = (u8) => [...u8].map(b => b.toString(16).padStart(2, '0')).join('');
  async function sha1hex(str) {
    const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str));
    return hex(new Uint8Array(buf));
  }

  // ── MediaSource pipeline ──────────────────────────────────────────────────
  let ms = null, sb = null, mime = '', ended = false, started = false;
  const queue = [];
  function flush() {
    if (!sb || sb.updating) return;
    if (queue.length) {
      try { sb.appendBuffer(queue.shift()); }
      catch (e) {
        if (e && e.name === 'QuotaExceededError') {
          // Evict everything well behind the playhead, then retry.
          try { const end = Math.max(0, v.currentTime - 10); if (end > 0) sb.remove(0, end); } catch (_) {}
        }
      }
    } else if (ended && ms && ms.readyState === 'open') {
      try { ms.endOfStream(); } catch (e) {}
    }
  }
  function onInit(m) {
    mime = m;
    if (!('MediaSource' in window) || !MediaSource.isTypeSupported(mime)) {
      fail('This browser can’t play the stream (' + mime + ').'); return;
    }
    ms = new MediaSource();
    v.src = URL.createObjectURL(ms);
    ms.addEventListener('sourceopen', () => {
      try { sb = ms.addSourceBuffer(mime); } catch (e) { fail('Could not start playback: ' + e.message); return; }
      sb.mode = 'sequence';
      sb.addEventListener('updateend', flush);
      flush();
    }, { once: true });
    setStatus('Streaming', true); note('');
    v.play && v.play().catch(() => {});
  }
  function onChunk(u8) { queue.push(u8); flush(); }

  // ── Signaling via bittorrent-tracker (browser WebRTC) ─────────────────────
  // NOTE: target=esnext keeps `class … extends EventEmitter` native — without it
  // esm.sh down-transpiles to ES5 and `super()` throws "Class constructor cannot
  // be invoked without 'new'" on some mobile browsers.
  let mod;
  try { mod = await import('https://esm.sh/bittorrent-tracker@9.19.0?target=esnext'); }
  catch (e) { fail('Could not load the connection library. Check your Internet connection.'); throw e; }
  const Client = mod.Client || (mod.default && mod.default.Client) || mod.default;
  if (!Client) { fail('Connection library unavailable.'); throw new Error('no Client'); }

  const topic = await sha1hex('th-watch:v1:' + raw);
  const peerId = hex(crypto.getRandomValues(new Uint8Array(20)));
  setStatus('Connecting to the sender…', true);

  let wired = false;
  function wire(peer) {
    if (wired) { try { peer.destroy(); } catch (e) {} return; }
    wired = true;
    setStatus('Connected', true);
    peer.on('data', (d) => {
      if (typeof d === 'string') {
        let msg; try { msg = JSON.parse(d); } catch (e) { return; }
        if (msg.t === 'init') { started = true; onInit(msg.mime); }
        else if (msg.t === 'end') { ended = true; flush(); }
        return;
      }
      onChunk(d instanceof Uint8Array ? d : new Uint8Array(d));
    });
    peer.on('close', () => { ended = true; flush(); if (!started) fail('The sender disconnected.'); });
    peer.on('error', () => {});
  }

  let client;
  try {
    client = new Client({ infoHash: topic, peerId, announce: TRACKERS, port: 1, rtcConfig: { iceServers } });
  } catch (e) { fail('Could not start the connection: ' + e.message); throw e; }
  client.on('peer', wire);
  client.on('warning', () => {});
  client.on('error', () => {});
  client.start();

  setTimeout(() => { if (!wired) setStatus('Waiting for the sender — is their Havvn open?', true); }, 15000);
</script>
</body>
</html>
